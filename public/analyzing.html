<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Se analizează… — The Ick</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body data-page="analyzing">
<main class="analyzing-page">
  <div class="analyzing-card">
    <div id="a-avatar" class="analyzing-avatar">A</div>
    <div id="a-handle" class="analyzing-handle">@username</div>
    <div id="a-status" class="analyzing-status">Inițializare scanare…</div>
    <div class="progress"><div id="progress-fill" class="progress-fill"></div></div>
    <div id="progress-pct" class="progress-pct">0%</div>
    <div class="steps">
      <div class="step"><div class="check">1</div><span>Conectare la profil</span></div>
      <div class="step"><div class="check">2</div><span>Scanare urmăritori</span></div>
      <div class="step"><div class="check">3</div><span>Vizualizări profil</span></div>
      <div class="step"><div class="check">4</div><span>Activitate recentă</span></div>
      <div class="step"><div class="check">5</div><span>Compilare raport</span></div>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
